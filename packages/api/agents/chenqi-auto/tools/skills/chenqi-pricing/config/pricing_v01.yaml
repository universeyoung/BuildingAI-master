# 辰启核价 v0.2 配置（用户可改）
# ============================================================
# 改完保存即生效（脚本每次启动重新读）。
#
# v0.2 核心改造：
#   1. 阈值改 warn-only（不再 P_FAILED），仅在飞书备注里标记
#   2. 利润目标自动降档（首档不通过 → 降 step 重试）
#   3. 17 个 Ozon 类目利润表填实数据（低价 25-30%，高价 45-50%）

profit:
  default: 0.40         # 全局默认（v0.1=0.50，v0.2 调到 0.40 更现实）

  # 类目利润目标（最高优先级）。key=ozon_cat_id (int)，value=利润率 (0~1)
  by_ozon_cat:
    # === 电子/3C（低价 25-30%）===
    17028908: 0.30   # 蓝牙音箱
    17028916: 0.30   # 耳机
    17028912: 0.25   # 数据线/转接
    17028914: 0.25   # 充电器
    # === 服饰（40-45%）===
    100024: 0.40     # 男装
    100025: 0.40     # 女装
    100027: 0.40     # 童装
    100040: 0.45     # 内衣/睡衣
    100050: 0.40     # 鞋
    # === 家居 ===
    200012: 0.45     # 厨具
    200030: 0.45     # 床品
    200045: 0.50     # 收纳/装饰
    # === 小家电 ===
    17029100: 0.35   # 小家电
    # === 美妆/个护 ===
    300010: 0.45     # 美妆
    300020: 0.40     # 个护
    # === 玩具/文具/宠物 ===
    400010: 0.40     # 玩具
    500010: 0.50     # 文具纸品
    600010: 0.50     # 宠物用品
    600020: 0.40     # 宠物食品

  # 利润目标自动降档（首档算不出来或打 warn 时自动降）
  fallback:
    enabled: true
    step: 0.05            # 每次降 5%
    floor: 0.20           # 地板 20%
    stop_when_no_warn: true   # 降到不打 warn 即停（让备注更干净）；false=只在 hard fail 才降

# Ozon 跨境店其他扣率（按最终售价 CNY 百分比）
other_rates:
  lastmile: 0.04        # 末端配送
  acquiring: 0.02       # 收单/支付
  buffer: 0.05          # 跨集群+退货预留
  ad: 0.08              # 广告预留
  agent: 0.02           # 平台代理

# 类目佣金率（cat_id → rate），未匹配走 default
commission_by_cat:
  # === 电子/3C ===
  17028908: 0.10        # 蓝牙音箱
  17028916: 0.10        # 耳机
  17028912: 0.12        # 数据线/转接
  17028914: 0.10        # 充电器
  # === 服饰 ===
  100024: 0.12          # 男装
  100025: 0.12          # 女装
  100027: 0.12          # 童装
  100040: 0.15          # 内衣/睡衣
  100050: 0.13          # 鞋
  # === 家居 ===
  200012: 0.12          # 厨具
  200030: 0.13          # 床品
  200045: 0.15          # 收纳/装饰
  # === 小家电 ===
  17029100: 0.10        # 小家电
  # === 美妆/个护 ===
  300010: 0.12          # 美妆
  300020: 0.12          # 个护
  # === 玩具 ===
  400010: 0.12          # 玩具
  # === 文具 ===
  500010: 0.18          # 文具纸品
  # === 宠物 ===
  600010: 0.15          # 宠物用品
  600020: 0.20          # 宠物食品
  # === 兜底 ===
  default: 0.15

# 物流配置
logistics:
  enabled_carriers: [GUOO, CEL]
  blocked_groups: []     # 可填 GUOO_BudgetSmall 禁慢线
  # 详细 9 组参数硬编码在 lib/logistics_groups.py

# 视觉降级
vision:
  enabled: true
  min_confidence: 0.6
  ref_images_max: 6      # 规格主图1张 + 多角度5张
  use_fields:            # 视觉来源字段（按时机安全顺序）
    - 规格主图URL
    - 采集多角度图组URL  # JSON 数组取前 5

# Sanity 阈值（v0.2 改为 warn-only 模式）
sanity:
  rate_total_max: 0.95          # 唯一硬死线：扣率合计达此值公式爆炸（无解）
  markup_warn: 25.0             # 售价/采购倍率 > 25x 打 warn（不阻断）
  logistics_ratio_warn: 0.55    # 物流占售价 > 55% 打 warn（不阻断）

# v0.2 特性开关（一键回滚到 v0.1）
v02_features:
  warn_only_mode: true          # true=warn 不挂；false=warn 升级为 P_FAILED（同 v0.1）
  profit_fallback: true         # true=自动降利润目标；false=只跑首档（同 v0.1）
