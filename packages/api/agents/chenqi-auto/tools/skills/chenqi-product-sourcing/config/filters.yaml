# =============================================================
# 辰启-选品调研 Skill 过滤规则
# =============================================================
# 本文件可被 cron prompt 中的字段覆盖（仅 defaults.* 中标 ✅ 的字段）
# 黑名单类目可被 cron prompt 追加（用 "不要 X" 写法）
# =============================================================

defaults:
  # 价格 / 重量
  采购价上限_cny: 150          # ✅ cron 可覆盖
  采购价下限_cny: 0            # ✅ cron 可覆盖
  重量上限_kg: 1.0             # ❌ 列表页拿不到 → 选品阶段跳过此过滤

  # 店铺质量
  月销下限: 50                 # ❌
  店龄下限_天: 30              # ❌

  # 批次配额
  默认数量: 3                  # ✅ cron 可覆盖
  默认时间窗_分钟: 20          # ✅ cron 可覆盖

# -------------------------------------------------------------
# 黑名单类目（基于 Ozon 跨境官方禁售 + 国际物流通用禁运）
# 用 LLM 判断商品标题是否落入这些类目；命中即剔除
# 可被 cron prompt 中的"不要 X"追加
# -------------------------------------------------------------
黑名单类目:
  - 食品保健品               # 清关复杂 + 保质期
  - 化妆品护肤品             # 俄海关需 EAC 认证
  - 药品医疗器械
  - 婴幼儿食品玩具           # EAC + 安全认证
  - 易碎品玻璃陶瓷           # 物流损坏率高
  - 锂电池充电宝             # 航空禁运
  - 香水含酒精液体           # 危险品
  - 仿牌品牌商品             # 知识产权风险
  - 武器仿真枪刀具
  - 成人用品
  - 宗教用品
  - 实木家具大件             # 体积超限
  - 二手商品
  - 古董文物                 # 出口管制
  - 活体动植物               # 检疫
  - 烟草电子烟

# -------------------------------------------------------------
# 兜底调研：4 路市场调研的 fallback 关键词池
# 当 web_search / browser 全失败时，从这里随机抽 1 个
# 这些是俄区跨境长青品类（你可以根据实际情况增删）
# -------------------------------------------------------------
fallback_keywords:
  - 家居收纳盒
  - 厨房小工具
  - 夏季女装连衣裙
  - 户外便携水杯
  - 简约首饰耳环
  - 宠物玩具
  - 文具记事本
  - 居家拖鞋
  - 桌面整理收纳
  - 健身阻力带
  - 保温饭盒
  - 浴室置物架
  - 车载香薰
  - 家居清洁刷具
  - 旅行收纳袋

# -------------------------------------------------------------
# 调研缓存
# -------------------------------------------------------------
research_cache:
  ttl_hours: 24                # 缓存有效期
  pool_size_target: 15         # 调研产出关键词池目标条数（10-20 区间）
  random_pick: true            # 每次跑随机抽 1 个未用过的

# -------------------------------------------------------------
# 滑块策略
# -------------------------------------------------------------
captcha:
  policy: skip                 # skip 方案 A: 直接 S_FAILED
  next_run_delay_hours: 1      # 整批触发滑块时下次 cron 延迟

# -------------------------------------------------------------
# Schema 守卫
# -------------------------------------------------------------
schema_guard:
  min_version: v3.1.0          # 低于此版本拒绝运行
  warn_on_hash_mismatch: true  # hash 不匹配警告但继续
